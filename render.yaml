# Render Blueprint — Free web service (spins down when idle)
# Dashboard: https://dashboard.render.com → New → Blueprint
services:
  - type: web
    name: property-hub
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHONUNBUFFERED
        value: "1"
