# Property Hub — Render Blueprint (free, separate from LivingBKK)
# Deploy: Dashboard → New → Blueprint → connect repo pantip-property-hub
services:
  - type: web
    name: property-hub
    runtime: docker
    repo: https://github.com/mycondobkkhost-cmd/pantip-property-hub
    branch: main
    plan: free
    region: singapore
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHONUNBUFFERED
        value: "1"
      # ตั้งค่าใน Render Dashboard (อย่า commit URL ลง git ถ้าชีทเป็นส่วนตัว)
      - key: MAIN_SHEET_CSV_URL
        sync: false
      - key: SOURCE_GOOGLE_SHEETS_ID
        sync: false
      - key: MAIN_SHEET_GID
        sync: false
      - key: WAIT_POST_SHEET_CSV_URL
        sync: false
      # ซิงค์กลับชีททดลอง (ต้องแชร์ชีทให้ SA เป็น Editor)
      - key: HUB_GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: HUB_OVERVIEW_SHEET_NAME
        value: ทรัพย์รวม
      - key: HUB_SHEET_NAME
        value: ทรัพย์ Hub
      - key: HUB_SHEET_GID
        sync: false
      # ตั้งใน Dashboard / API — ห้าม commit รหัสผ่านจริง
      - key: HUB_USERS_JSON
        sync: false
      - key: HUB_SESSION_SECRET
        generateValue: true
